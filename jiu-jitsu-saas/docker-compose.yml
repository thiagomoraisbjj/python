version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jiu_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/jiu_saas
      JWT_SECRET: supersecret
      MERCADO_PAGO_ACCESS_TOKEN: your_token
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:

